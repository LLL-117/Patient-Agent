<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Patient API Test Page</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.65);
        --border: rgba(255, 255, 255, 0.14);
        --btn: rgba(255, 255, 255, 0.07);
      }
      body {
        margin: 0;
        background: radial-gradient(1200px 700px at 50% 0%, #1a2a5a 0%, var(--bg) 60%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      .topbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .card {
        margin-top: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }
      h2 {
        font-size: 16px;
        margin: 0 0 10px 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 10px;
      }
      .col-12 {
        grid-column: span 12;
      }
      .col-6 {
        grid-column: span 6;
      }
      .col-4 {
        grid-column: span 4;
      }
      .col-3 {
        grid-column: span 3;
      }
      @media (max-width: 900px) {
        .col-6,
        .col-4,
        .col-3 {
          grid-column: span 12;
        }
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        padding: 10px 12px;
        color: var(--text);
        outline: none;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: var(--btn);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 800;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
      .result {
        white-space: pre-wrap;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 14px;
        padding: 12px;
        min-height: 140px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 12px;
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1 style="margin:0; font-size:18px;">Patient API Test</h1>
          <div class="muted">用于点击测试患者身份、病例、就诊记录的写入与读取。</div>
        </div>
        <div class="row">
          <span class="badge" id="statusBadge">ready</span>
        </div>
      </div>

      <div class="card">
        <div class="grid">
          <div class="col-12">
            <label>API Base URL</label>
            <input id="baseUrl" value="http://127.0.0.1:8000" />
            <div class="muted" style="margin-top:8px;">
              提示：先启动 FastAPI：<code>d:\Cursor</code> 目录运行 uvicorn。
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>1) Upsert Patient</h2>
        <div class="grid">
          <div class="col-4">
            <label>患者编号</label>
            <input id="p_code" placeholder="例如 P1001" />
          </div>
          <div class="col-4">
            <label>name</label>
            <input id="p_name" value="张三" />
          </div>
          <div class="col-4">
            <label>gender</label>
            <input id="p_gender" value="M" />
          </div>
          <div class="col-4">
            <label>birth_date (YYYY-MM-DD)</label>
            <input id="p_birth" value="1980-01-01" />
          </div>
          <div class="col-4">
            <label>手机号（11 位，必填）</label>
            <input id="p_phone" placeholder="例如 13800000001" inputmode="numeric" autocomplete="off" />
          </div>
          <div class="col-4">
            <label>id_number</label>
            <input id="p_idnum" value="110101198001010000" />
          </div>
          <div class="col-12">
            <label>address</label>
            <input id="p_addr" value="示例地址" />
          </div>
          <div class="col-12">
            <label>raw_json（可选）</label>
            <textarea id="p_raw" placeholder='{"marital_status":"unmarried"}'>{"marital_status":"unmarried"}</textarea>
          </div>
          <div class="col-12">
            <div class="row">
              <button type="button" id="btnUpsert">Upsert Patient</button>
              <span class="muted">返回的 `patient_id` 将用于后续“写病例/写就诊记录”。</span>
            </div>
          </div>
          <div class="col-12">
            <label>Current patient_id（会自动填充）</label>
            <input id="currentPatientId" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>2) Add Medical Case</h2>
        <div class="grid">
          <div class="col-12">
            <label>patient_id（默认取上一步）</label>
            <input id="case_patient_id" />
          </div>
          <div class="col-6">
            <label>case_title</label>
            <input id="c_title" value="上呼吸道感染" />
          </div>
          <div class="col-6">
            <label>diagnosis</label>
            <input id="c_diag" value="急性上呼吸道感染" />
          </div>
          <div class="col-12">
            <label>description</label>
            <input id="c_desc" value="示例病例描述" />
          </div>
          <div class="col-4">
            <label>onset_date</label>
            <input id="c_onset" value="2026-03-10" />
          </div>
          <div class="col-8">
            <label>raw_json（可选）</label>
            <textarea id="c_raw" placeholder='{"severity":"low"}'>{"severity":"low"}</textarea>
          </div>
          <div class="col-12">
            <button type="button" id="btnAddCase">Add Case</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>3) Add Visit Record</h2>
        <div class="grid">
          <div class="col-12">
            <label>patient_id（默认取上一步）</label>
            <input id="visit_patient_id" />
          </div>
          <div class="col-3">
            <label>visit_date</label>
            <input id="v_date" value="2026-03-20" />
          </div>
          <div class="col-3">
            <label>department</label>
            <input id="v_dept" value="呼吸内科" />
          </div>
          <div class="col-3">
            <label>doctor</label>
            <input id="v_doc" value="Dr. Li" />
          </div>
          <div class="col-3">
            <label>source</label>
            <input id="v_source" value="EMR" />
          </div>
          <div class="col-12">
            <label>chief_complaint</label>
            <input id="v_cc" value="咳嗽 3 天" />
          </div>
          <div class="col-12">
            <label>diagnosis</label>
            <input id="v_diag" value="急性咽炎" />
          </div>
          <div class="col-12">
            <label>notes</label>
            <input id="v_notes" value="示例就诊备注" />
          </div>
          <div class="col-12">
            <label>raw_json（可选）</label>
            <textarea id="v_raw" placeholder='{"vitals":{"temp":37.5}}'>{"vitals":{"temp":37.5}}</textarea>
          </div>
          <div class="col-12">
            <button type="button" id="btnAddVisit">Add Visit</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>4) Read Back</h2>
        <div class="grid">
          <div class="col-6">
            <label>patient_id</label>
            <input id="read_patient_id" />
          </div>
          <div class="col-6">
            <label>患者编号（可选）</label>
            <input id="read_patient_code" placeholder="例如 P1001" />
          </div>
          <div class="col-12 row">
            <button type="button" id="btnGetFullById">Get /patients/{patient_id}/full</button>
            <button type="button" id="btnGetByCode">Get /patients/by-code/{patient_code}</button>
          </div>
          <div class="col-12" style="margin-top:10px;">
            <div class="result" id="result">点击按钮后会在这里显示请求结果。</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      function setBadge(text, ok) {
        const el = $("statusBadge");
        el.textContent = text;
        el.style.color = ok ? "rgba(170, 255, 210, 0.95)" : "rgba(255, 170, 170, 0.95)";
      }

      function safeJsonParse(text) {
        if (!text) return null;
        const trimmed = String(text).trim();
        if (!trimmed) return null;
        return JSON.parse(trimmed);
      }

      async function requestJson(method, url, body) {
        const opts = {
          method,
          headers: { "Content-Type": "application/json" },
        };
        if (body !== undefined) opts.body = JSON.stringify(body);
        const resp = await fetch(url, opts);
        const contentType = resp.headers.get("content-type") || "";
        let data;
        if (contentType.includes("application/json")) {
          data = await resp.json();
        } else {
          data = await resp.text();
        }
        return { status: resp.status, ok: resp.ok, data };
      }

      function renderResult(obj) {
        $("result").textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      }

      function syncPatientIdFields(pid) {
        $("case_patient_id").value = pid;
        $("visit_patient_id").value = pid;
        $("read_patient_id").value = pid;
      }

      $("btnUpsert").addEventListener("click", async () => {
        try {
          setBadge("upserting...", true);
          const baseUrl = $("baseUrl").value.replace(/\/+$/, "");
          const phone = $("p_phone").value.trim();
          if (!/^1\d{10}$/.test(phone)) {
            renderResult({ error: "请填写 11 位手机号（必填，例如 13800000001）" });
            setBadge("phone required", false);
            return;
          }
          const body = {
            patient_code: $("p_code").value.trim() || undefined,
            name: $("p_name").value.trim() || undefined,
            gender: $("p_gender").value.trim() || undefined,
            birth_date: $("p_birth").value.trim() || undefined,
            phone: phone,
            id_number: $("p_idnum").value.trim() || undefined,
            address: $("p_addr").value.trim() || undefined,
            raw_json: safeJsonParse($("p_raw").value),
          };
          // Remove undefined keys (keeps payload cleaner).
          Object.keys(body).forEach((k) => body[k] === undefined && delete body[k]);

          const res = await requestJson("POST", `${baseUrl}/patients/upsert`, body);
          renderResult(res);
          if (!res.ok) {
            setBadge("failed", false);
            return;
          }
          const pid = res.data.patient_id;
          $("currentPatientId").value = pid;
          syncPatientIdFields(pid);
          setBadge("upsert ok", true);
        } catch (e) {
          setBadge("error", false);
          renderResult({ error: String(e) });
        }
      });

      $("btnAddCase").addEventListener("click", async () => {
        try {
          setBadge("adding case...", true);
          const baseUrl = $("baseUrl").value.replace(/\/+$/, "");
          const patient_id = $("case_patient_id").value.trim();
          if (!patient_id) throw new Error("patient_id 不能为空（先 Upsert Patient）");

          const body = {
            case_title: $("c_title").value.trim() || undefined,
            diagnosis: $("c_diag").value.trim() || undefined,
            description: $("c_desc").value.trim() || undefined,
            onset_date: $("c_onset").value.trim() || undefined,
            raw_json: safeJsonParse($("c_raw").value),
          };
          Object.keys(body).forEach((k) => body[k] === undefined && delete body[k]);

          const res = await requestJson("POST", `${baseUrl}/patients/${encodeURIComponent(patient_id)}/cases`, body);
          renderResult(res);
          setBadge(res.ok ? "case ok" : "failed", !!res.ok);
        } catch (e) {
          setBadge("error", false);
          renderResult({ error: String(e) });
        }
      });

      $("btnAddVisit").addEventListener("click", async () => {
        try {
          setBadge("adding visit...", true);
          const baseUrl = $("baseUrl").value.replace(/\/+$/, "");
          const patient_id = $("visit_patient_id").value.trim();
          if (!patient_id) throw new Error("patient_id 不能为空（先 Upsert Patient）");

          const body = {
            visit_date: $("v_date").value.trim() || undefined,
            department: $("v_dept").value.trim() || undefined,
            chief_complaint: $("v_cc").value.trim() || undefined,
            diagnosis: $("v_diag").value.trim() || undefined,
            doctor: $("v_doc").value.trim() || undefined,
            notes: $("v_notes").value.trim() || undefined,
            source: $("v_source").value.trim() || undefined,
            raw_json: safeJsonParse($("v_raw").value),
          };
          Object.keys(body).forEach((k) => body[k] === undefined && delete body[k]);

          const res = await requestJson("POST", `${baseUrl}/patients/${encodeURIComponent(patient_id)}/visits`, body);
          renderResult(res);
          setBadge(res.ok ? "visit ok" : "failed", !!res.ok);
        } catch (e) {
          setBadge("error", false);
          renderResult({ error: String(e) });
        }
      });

      $("btnGetFullById").addEventListener("click", async () => {
        try {
          setBadge("reading full...", true);
          const baseUrl = $("baseUrl").value.replace(/\/+$/, "");
          const patient_id = $("read_patient_id").value.trim();
          if (!patient_id) throw new Error("patient_id 不能为空");

          const res = await requestJson("GET", `${baseUrl}/patients/${encodeURIComponent(patient_id)}/full`);
          renderResult(res);
          setBadge(res.ok ? "read ok" : "failed", !!res.ok);
        } catch (e) {
          setBadge("error", false);
          renderResult({ error: String(e) });
        }
      });

      $("btnGetByCode").addEventListener("click", async () => {
        try {
          setBadge("reading by code...", true);
          const baseUrl = $("baseUrl").value.replace(/\/+$/, "");
          const patient_code = $("read_patient_code").value.trim();
          if (!patient_code) throw new Error("患者编号不能为空");

          const res = await requestJson("GET", `${baseUrl}/patients/by-code/${encodeURIComponent(patient_code)}`);
          renderResult(res);
          setBadge(res.ok ? "read ok" : "failed", !!res.ok);
          if (res.ok && res.data && res.data.patient && res.data.patient.patient_id) {
            const pid = res.data.patient.patient_id;
            $("currentPatientId").value = pid;
            syncPatientIdFields(pid);
          }
        } catch (e) {
          setBadge("error", false);
          renderResult({ error: String(e) });
        }
      });

      // initial sync when page loads (if user manually filled currentPatientId).
      (function init() {
        const pid = $("currentPatientId").value.trim();
        if (pid) syncPatientIdFields(pid);
      })();
    </script>
  </body>
</html>
